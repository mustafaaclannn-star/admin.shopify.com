<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homely Co · Analizler · Shopify</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: #f3f3f3;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    :root {
      /* header.png oranı 2048x206 olduğu için bu yükseklik tam ölçeklenir */
      --header-height: 10.06vw;

      /* Görsellerdeki sol menü genişliği. Gerekirse 16.2vw / 17vw deneyebilirsin. */
      --sidebar-width: 16.7vw;
    }

    .fixed-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: var(--header-height);
      z-index: 3000;
      overflow: hidden;
      background: #111;
      line-height: 0;
      box-shadow: 0 4px 18px rgba(0,0,0,0.16);
    }

    .fixed-header img {
      width: 100vw;
      height: auto;
      display: block;
    }

    .fixed-sidebar {
      position: fixed;
      top: var(--header-height);
      left: 0;
      width: var(--sidebar-width);
      height: calc(100vh - var(--header-height));
      z-index: 2500;
      overflow: hidden;
      background: #f4f4f4;
      border-right: 1px solid rgba(0,0,0,0.06);
      line-height: 0;
    }

    /* Sidebar ayrı dosya değildir, foto1.png içinden alınır */
    .fixed-sidebar img {
      width: 100vw;
      max-width: none;
      display: block;
      margin: 0;
      padding: 0;
    }

    .content {
      padding-top: var(--header-height);
      margin-left: var(--sidebar-width);
      width: calc(100vw - var(--sidebar-width));
      background: #f3f3f3;
      position: relative;
      z-index: 1;
    }

    .screen {
      width: calc(100vw - var(--sidebar-width));
      overflow: hidden;
      margin: 0;
      padding: 0;
      line-height: 0;
      background: #f3f3f3;
    }

    /* Kayan görsellerdeki sidebar kısmını görünür alanın dışına iter */
    .screen img {
      width: 100vw;
      max-width: none;
      display: block;
      transform: translateX(calc(-1 * var(--sidebar-width)));
      margin: 0;
      padding: 0;
    }

    .screen + .screen { margin-top: -2px; }
  </style>
</head>
<body>
  <header class="fixed-header">
    <img src="header.png" alt="Shopify üst görev çubuğu" />
  </header>

  <aside class="fixed-sidebar">
    <img src="foto1.png" alt="Shopify sol menü" />
  </aside>

  <main class="content">
    <section class="screen"><img src="foto1.png" alt="Analytics 1" /></section>
    <section class="screen"><img src="foto2.png" alt="Analytics 2" /></section>
    <section class="screen"><img src="foto3.png" alt="Analytics 3" /></section>
    <section class="screen"><img src="foto4.png" alt="Analytics 4" /></section>
  </main>
</body>
</html>
