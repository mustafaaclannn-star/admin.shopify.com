<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homely Co · Analizler · Shopify</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #f3f3f3;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    /*
      Ana ayarlar:
      Header büyük/küçük görünürse sadece --header-height değerini değiştir.
      Sidebar sağa/sola kayarsa sadece --sidebar-width değerini değiştir.
    */
    :root {
      --header-height: 145px;
      --sidebar-width: 265px;
    }

    /* ÜSTTE SABİT GÖREV ÇUBUĞU */
    .fixed-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: var(--header-height);
      z-index: 3000;
      overflow: hidden;
      background: #111;
      line-height: 0;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    }

    .fixed-header img {
      width: 100vw;
      height: var(--header-height);
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    /* SOLDA SABİT MENÜ */
    .fixed-sidebar {
      position: fixed;
      top: var(--header-height);
      left: 0;
      width: var(--sidebar-width);
      height: calc(100vh - var(--header-height));
      z-index: 2500;
      overflow: hidden;
      background: #f5f5f5;
      border-right: 1px solid rgba(0,0,0,0.06);
    }

    /*
      Sidebar ayrı fotoğraf istemez.
      foto1.png içindeki sol menüyü kullanır.
    */
    .fixed-sidebar img {
      width: 100vw;
      max-width: none;
      display: block;
      margin: 0;
      padding: 0;
    }

    /* ANA KAYAN İÇERİK */
    .content {
      padding-top: var(--header-height);
      margin-left: var(--sidebar-width);
      width: calc(100vw - var(--sidebar-width));
      background: #f3f3f3;
      position: relative;
      z-index: 1;
    }

    .screen {
      width: calc(100vw - var(--sidebar-width));
      overflow: hidden;
      margin: 0;
      padding: 0;
      line-height: 0;
      background: #f3f3f3;
    }

    /*
      Görsellerin içindeki sol menüyü görünür alanın dışına kaydırır.
      Böylece solda sadece sabit sidebar görünür.
    */
    .screen img {
      width: 100vw;
      max-width: none;
      display: block;
      transform: translateX(calc(-1 * var(--sidebar-width)));
      margin: 0;
      padding: 0;
    }

    /*
      Sayfa aralarındaki ince boşluğu kapatır.
      Boşluk kalırsa -3px yapabilirsin.
    */
    .screen + .screen {
      margin-top: -2px;
    }

    @media (max-width: 900px) {
      :root {
        --header-height: 65px;
        --sidebar-width: 230px;
      }
    }
  </style>
</head>

<body>

  <!-- Üstte sabit kalan görev çubuğu -->
  <header class="fixed-header">
    <img src="header.png" alt="Shopify üst görev çubuğu">
  </header>

  <!-- Solda sabit kalan menü, foto1.png içinden alınır -->
  <aside class="fixed-sidebar">
    <img src="foto1.png" alt="Shopify sol menü">
  </aside>

  <!-- Kaydırılan içerikler -->
  <main class="content">
    <section class="screen">
      <img src="foto1.png" alt="Analytics ekranı 1">
    </section>

    <section class="screen">
      <img src="foto2.png" alt="Analytics ekranı 2">
    </section>

    <section class="screen">
      <img src="foto3.png" alt="Analytics ekranı 3">
    </section>

    <section class="screen">
      <img src="foto4.png" alt="Analytics ekranı 4">
    </section>
  </main>

</body>
</html>
