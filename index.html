<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homely Co · Analizler · Shopify</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #f3f3f3;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    :root {
      /*
        Bunlar ayar düğmeleri.
        Oturmazsa sadece bu ikisini değiştirmen yeterli.
      */
      --header-height: 145px;
      --sidebar-width: 255px;
    }

    /* ÜSTTE SABİT GÖREV ÇUBUĞU */
    .fixed-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: var(--header-height);
      z-index: 1000;
      overflow: hidden;
      background: #111;
    }

    .fixed-header img {
      width: 100vw;
      height: var(--header-height);
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    /* SOLDA SABİT MENÜ */
    .fixed-sidebar {
      position: fixed;
      top: var(--header-height);
      left: 0;
      width: var(--sidebar-width);
      height: calc(100vh - var(--header-height));
      z-index: 900;
      overflow: hidden;
      background: #f5f5f5;
      border-right: 1px solid rgba(0,0,0,0.06);
    }

    /*
      Sidebar fotoğrafı ayrıca yok.
      foto1.png içinden sol kısmı kullanıyoruz.
    */
    .fixed-sidebar img {
      width: 100vw;
      max-width: none;
      display: block;
      transform: translateX(0);
    }

    /* ANA KAYAN ALAN */
    .content {
      padding-top: var(--header-height);
      margin-left: var(--sidebar-width);
      width: calc(100vw - var(--sidebar-width));
      background: #f3f3f3;
    }

    .screen {
      width: calc(100vw - var(--sidebar-width));
      overflow: hidden;
      margin: 0;
      padding: 0;
      line-height: 0;
      background: #f3f3f3;
    }

    /*
      Görsellerin içindeki sol menüyü gizliyoruz.
      Görsel sola kayıyor, sadece ana içerik kısmı görünüyor.
    */
    .screen img {
      width: 100vw;
      max-width: none;
      display: block;
      transform: translateX(calc(-1 * var(--sidebar-width)));
      margin: 0;
      padding: 0;
    }

    /*
      Sayfa geçişlerini yumuşatır.
      Arada çizgi/boşluk kalırsa -2px veya -3px yap.
    */
    .screen + .screen {
      margin-top: -2px;
    }
  </style>
</head>

<body>

  <!-- SABİT ÜST BAR -->
  <header class="fixed-header">
    <img src="header.png" alt="Shopify üst bar">
  </header>

  <!-- SABİT SOL MENÜ: foto1.png içinden alınır -->
  <aside class="fixed-sidebar">
    <img src="foto1.png" alt="Shopify sol menü">
  </aside>

  <!-- KAYAN İÇERİK -->
  <main class="content">
    <section class="screen">
      <img src="foto1.png" alt="Analytics 1">
    </section>

    <section class="screen">
      <img src="foto2.png" alt="Analytics 2">
    </section>

    <section class="screen">
      <img src="foto3.png" alt="Analytics 3">
    </section>

    <section class="screen">
      <img src="foto4.png" alt="Analytics 4">
    </section>
  </main>

</body>
</html>
